<svg width="1200" height="280" viewBox="0 0 1200 280" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0a0b"/>
      <stop offset="50%" stop-color="#0f0f18"/>
      <stop offset="100%" stop-color="#0a0a0b"/>
    </linearGradient>

    <!-- Purple glow gradient for accent elements -->
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c6af7"/>
      <stop offset="100%" stop-color="#b8a9ff"/>
    </linearGradient>

    <!-- Green gradient for success indicator -->
    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3ecf8e"/>
      <stop offset="100%" stop-color="#5eeaaa"/>
    </linearGradient>

    <!-- Timeline dot glow -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft glow for logo -->
    <filter id="logoGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.04"/>
    </pattern>

    <!-- Clip path for rounded corners -->
    <clipPath id="rounded">
      <rect width="1200" height="280" rx="16"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="280" rx="16" fill="url(#bg)"/>

  <!-- Grid overlay -->
  <rect width="1200" height="280" rx="16" fill="url(#grid)" clip-path="url(#rounded)"/>

  <!-- Top border line - accent color -->
  <rect x="0" y="0" width="1200" height="2" rx="1" fill="url(#accentGrad)" opacity="0.8"/>

  <!-- Subtle radial glow in center-left -->
  <ellipse cx="350" cy="140" rx="300" ry="180" fill="#7c6af7" opacity="0.04"/>

  <!-- ── Left side: Logo + Name ────────────────────────────────── -->

  <!-- Logo mark: orbit-style icon -->
  <!-- Outer ring -->
  <circle cx="96" cy="140" r="42" fill="none" stroke="#7c6af7" stroke-width="1.5" opacity="0.3"/>
  <!-- Middle ring -->
  <circle cx="96" cy="140" r="28" fill="none" stroke="#7c6af7" stroke-width="1.5" opacity="0.5"/>
  <!-- Core dot -->
  <circle cx="96" cy="140" r="12" fill="#7c6af7" filter="url(#logoGlow)" opacity="0.9"/>
  <circle cx="96" cy="140" r="6" fill="#b8a9ff"/>

  <!-- Orbiting dots on outer ring -->
  <circle cx="96" cy="98" r="4" fill="#7c6af7" filter="url(#glow)"/>
  <circle cx="133" cy="161" r="3" fill="#4da6ff" filter="url(#glow)"/>
  <circle cx="59" cy="161" r="3" fill="#3ecf8e" filter="url(#glow)"/>

  <!-- Connector lines from core to orbit dots -->
  <line x1="96" y1="128" x2="96" y2="102" stroke="#7c6af7" stroke-width="1" opacity="0.4"/>
  <line x1="106" y1="148" x2="130" y2="159" stroke="#4da6ff" stroke-width="1" opacity="0.4"/>
  <line x1="86" y1="148" x2="62" y2="159" stroke="#3ecf8e" stroke-width="1" opacity="0.4"/>

  <!-- Product name -->
  <text x="160" y="126" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="42" font-weight="700" letter-spacing="-1" fill="white">Agent</text>
  <text x="160" y="126" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="42" font-weight="700" letter-spacing="-1" fill="url(#accentGrad)" dx="118">Trace</text>

  <!-- Tagline -->
  <text x="161" y="160" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="15" fill="#9090a8" letter-spacing="0.2">Visual debugger for AI agent loops</text>

  <!-- Sub-tagline pills -->
  <!-- Pill 1: Step-by-step -->
  <rect x="161" y="178" width="118" height="24" rx="12" fill="#7c6af7" opacity="0.15"/>
  <rect x="161" y="178" width="118" height="24" rx="12" fill="none" stroke="#7c6af7" stroke-width="1" opacity="0.4"/>
  <text x="220" y="195" text-anchor="middle" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="11" fill="#b8a9ff">Step-by-step</text>

  <!-- Pill 2: 100% Local -->
  <rect x="287" y="178" width="100" height="24" rx="12" fill="#3ecf8e" opacity="0.1"/>
  <rect x="287" y="178" width="100" height="24" rx="12" fill="none" stroke="#3ecf8e" stroke-width="1" opacity="0.4"/>
  <text x="337" y="195" text-anchor="middle" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="11" fill="#3ecf8e">100% Local</text>

  <!-- Pill 3: Zero Config -->
  <rect x="395" y="178" width="100" height="24" rx="12" fill="#4da6ff" opacity="0.1"/>
  <rect x="395" y="178" width="100" height="24" rx="12" fill="none" stroke="#4da6ff" stroke-width="1" opacity="0.4"/>
  <text x="445" y="195" text-anchor="middle" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="11" fill="#4da6ff">Zero Config</text>

  <!-- ── Vertical divider ───────────────────────────────────────── -->
  <line x1="620" y1="50" x2="620" y2="230" stroke="#2a2a35" stroke-width="1"/>

  <!-- ── Right side: Mini timeline demo ──────────────────────────── -->

  <!-- Section label -->
  <text x="660" y="72" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="11" fill="#55556a" letter-spacing="0.1">EXECUTION TIMELINE</text>

  <!-- Timeline track -->
  <line x1="660" y1="120" x2="1140" y2="120" stroke="#2a2a35" stroke-width="2"/>

  <!-- Step nodes on timeline -->
  <!-- Step 1: LLM call - purple -->
  <circle cx="700" cy="120" r="10" fill="#7c6af7" filter="url(#glow)"/>
  <text x="700" y="148" text-anchor="middle" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="9" fill="#55556a">llm</text>

  <!-- Step 2: tool call - blue -->
  <circle cx="760" cy="120" r="9" fill="#4da6ff" filter="url(#glow)"/>
  <text x="760" y="148" text-anchor="middle" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="9" fill="#55556a">tool</text>

  <!-- Step 3: LLM call - purple -->
  <circle cx="820" cy="120" r="9" fill="#7c6af7"/>
  <text x="820" y="148" text-anchor="middle" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="9" fill="#55556a">llm</text>

  <!-- Step 4: tool call - blue -->
  <circle cx="880" cy="120" r="9" fill="#4da6ff"/>
  <text x="880" y="148" text-anchor="middle" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="9" fill="#55556a">tool</text>

  <!-- Step 5: LLM - purple -->
  <circle cx="940" cy="120" r="9" fill="#7c6af7"/>
  <text x="940" y="148" text-anchor="middle" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="9" fill="#55556a">llm</text>

  <!-- Step 6: completed - green -->
  <circle cx="1000" cy="120" r="9" fill="#3ecf8e" filter="url(#glow)"/>
  <text x="1000" y="148" text-anchor="middle" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="9" fill="#55556a">tool</text>

  <!-- Step 7: error - red, bigger with glow -->
  <circle cx="1060" cy="120" r="13" fill="#f5534f" filter="url(#glow)" opacity="0.9"/>
  <text x="1060" y="120" text-anchor="middle" dominant-baseline="middle" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="12" fill="white" font-weight="700">✕</text>
  <text x="1060" y="148" text-anchor="middle" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="9" fill="#f5534f">ERROR</text>

  <!-- Active step callout box -->
  <rect x="980" y="158" width="160" height="62" rx="6" fill="#18181d" stroke="#f5534f" stroke-width="1" opacity="0.9"/>
  <rect x="980" y="158" width="160" height="4" rx="2" fill="#f5534f" opacity="0.6"/>

  <!-- Arrow pointing up to error dot -->
  <line x1="1060" y1="158" x2="1060" y2="137" stroke="#f5534f" stroke-width="1" stroke-dasharray="3,2" opacity="0.7"/>

  <text x="992" y="176" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="9" fill="#f5534f" font-weight="600">STEP 7 — write_file</text>
  <text x="992" y="191" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="8.5" fill="#9090a8">PermissionError:</text>
  <text x="992" y="205" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="8.5" fill="#9090a8">cannot write output.md</text>

  <!-- ── Bottom bar ─────────────────────────────────────────────── -->
  <rect x="0" y="244" width="1200" height="36" rx="0" fill="#0d0d12" opacity="0.7"/>
  <rect x="0" y="242" width="1200" height="280" rx="16" fill="#0d0d12" opacity="0.7" clip-path="url(#rounded)"/>

  <!-- bottom border -->
  <rect x="0" y="278" width="1200" height="2" rx="1" fill="url(#accentGrad)" opacity="0.3"/>

  <!-- Install commands in bottom bar -->
  <text x="50" y="264" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="12" fill="#55556a">pip</text>
  <text x="75" y="264" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="12" fill="#9090a8">install agentrace</text>

  <text x="240" y="264" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="12" fill="#55556a">·</text>

  <text x="258" y="264" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="12" fill="#55556a">npx</text>
  <text x="283" y="264" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="12" fill="#9090a8">@ravaniroshan/agentrace</text>

  <text x="530" y="264" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="12" fill="#55556a">·</text>

  <!-- Right side: MIT + Python + Node badges -->
  <text x="840" y="264" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="11" fill="#404050">MIT</text>
  <text x="875" y="264" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="11" fill="#404050">·</text>
  <text x="889" y="264" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="11" fill="#404050">Python 3.10+</text>
  <text x="985" y="264" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="11" fill="#404050">·</text>
  <text x="999" y="264" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="11" fill="#404050">Node 18+</text>
  <text x="1075" y="264" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="11" fill="#404050">·</text>
  <text x="1089" y="264" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="11" fill="#404050">Open Source</text>

</svg>
